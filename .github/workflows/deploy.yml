name: Deploy to Cloudflare Pages

# Auto-deploys integritybuilds.dev on every push to main.
# Reuses deploy.sh, which stages the shippable files into _deploy/, stamps the
# __BUILD__ cache-busting placeholder with a timestamp, and runs
# `wrangler pages deploy`. The integritybuilds Pages project is Direct Upload
# (it cannot use Cloudflare's native Git integration), so deploys go through
# Wrangler here in CI, the same pattern the acmeridian project uses.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN   - token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - the Cloudflare account that owns the Pages project

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # One in-flight deploy at a time; queue the next instead of overlapping.
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Stage, stamp, and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash ./deploy.sh "CI deploy ${GITHUB_SHA::7}"
